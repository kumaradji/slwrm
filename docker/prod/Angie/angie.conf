user angie;
worker_processes auto;
worker_rlimit_nofile 65536;
error_log /var/log/angie/error.log warn;
pid /run/angie/angie.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/angie/mime.types;
    default_type application/octet-stream;
    types_hash_max_size 2048;

    # ---------------- Logs ----------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/angie/access.log main;

    # ---------------- Performance ----------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;
    client_max_body_size 20M;

    # ---------------- Gzip ----------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ---------------- Upstreams ----------------
    upstream django {
        server django:8000;
    }

    upstream frontend {
        server react:3000;
    }

    # ---------------- ACME ----------------
    acme_client letsencrypt https://acme-v02.api.letsencrypt.org/directory;
    resolver 127.0.0.11;

    map $acme_cert_letsencrypt $cert_letsencrypt {
        '' /etc/angie/certs/cert.pem;
        default $acme_cert_letsencrypt;
    }

    map $acme_cert_letsencrypt $cert_key_letsencrypt {
        '' /etc/angie/certs/key.pem;
        default $acme_cert_key_letsencrypt;
    }

    # =================================================
    # HTTP :80 — ACME challenge + redirect
    # =================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name koltsovaecoprint.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/html;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =================================================
    # HTTPS :443
    # =================================================
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name koltsovaecoprint.ru;

        acme letsencrypt;
        ssl_certificate     $cert_letsencrypt;
        ssl_certificate_key $cert_key_letsencrypt;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_prefer_server_ciphers off;

        charset utf-8;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        location /admin {
            proxy_pass http://django;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_redirect off;
        }

        location /api {
            proxy_pass http://django;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_redirect off;
        }

        location /backend_static/ {
            alias /app/backend/static/;
        }

        location /media/ {
            alias /app/backend/media/;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_redirect off;
        }
    }
}
